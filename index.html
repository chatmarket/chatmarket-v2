    <!-- ★ SW登録 v5: Network First + Cache First 戦略 / 古いキャッシュはSW側で自動削除 -->
    <script>
      // SW v5 登録 — キャッシュ戦略はSW内部で管理
      var CACHE_VERSION = '20260515-v5';
      var stored = localStorage.getItem('cm_cache_ver');

      if ('serviceWorker' in navigator) {
        // SW登録（更新があれば自動的にskipWaiting→activate→古いキャッシュ削除）
        navigator.serviceWorker.register('/sw.js').then(function(reg) {
          console.log('[SW] Registered:', reg.scope);
          // バージョン変更時のみ即時更新を促す
          if (stored !== CACHE_VERSION) {
            reg.update();
          }
        }).catch(function(err) {
          console.warn('[SW] Registration failed:', err);
        });
      }

      // バージョン変更時のみキャッシュバースト（古いSWキャッシュ名を削除）
      if (stored !== CACHE_VERSION) {
        if ('caches' in window) {
          caches.keys().then(function(names) {
            names.forEach(function(name) {
              // v5より古いchatmarketキャッシュのみ削除
              if (name.startsWith('chatmarket-') && !name.endsWith('-v5')) {
                caches.delete(name);
                console.log('[CacheClean] Deleted old cache:', name);
              }
            });
          });
        }
        localStorage.setItem('cm_cache_ver', CACHE_VERSION);
      }
    </script>
