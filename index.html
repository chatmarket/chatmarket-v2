    <!-- ★ SW強制クリア v2: キャッシュが修正を妨害しないよう全SWを登録解除＋キャッシュ削除 -->
    <script>
      // バージョントークン: 変更するたびにキャッシュが無効化される
      var CACHE_VERSION = '20260427-hlsonly';
      var stored = localStorage.getItem('cm_cache_ver');
      if (stored !== CACHE_VERSION) {
        localStorage.setItem('cm_cache_ver', CACHE_VERSION);
        // 全SW解除
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(regs) {
            regs.forEach(function(reg) { reg.unregister(); });
          });
        }
        // 全キャッシュ削除
        if ('caches' in window) {
          caches.keys().then(function(names) {
            names.forEach(function(name) { caches.delete(name); });
          });
        }
        // 初回のみリロード（無限ループ防止）
        if (!sessionStorage.getItem('cm_reloaded_' + CACHE_VERSION)) {
          sessionStorage.setItem('cm_reloaded_' + CACHE_VERSION, '1');
          window.location.reload(true);
        }
      }
    </script>
    <!-- ★ vConsole: スマホ画面でブラウザログ直視 -->
    <script src="https://unpkg.com/vconsole@latest/dist/vconsole.min.js"></script>
    <script>
      if (window.location.hostname.includes('localhost') || 
          window.location.hostname.includes('staging') ||
          window.location.hostname.includes('127.0.0.1')) {
        new window.VConsole();
        console.log('[vConsole] 🎮 Enabled');
      }
    </script>

    <!-- ★ ログ送信初期化（認証付き POST） -->
    <script>
      window.__logBuffer = [];
      window.__sendLogs = function(token) {
        if (window.__logBuffer.length === 0) return Promise.resolve();
        
        const payload = {
          path: window.location.pathname,
          hostname: window.location.hostname,
          logs: window.__logBuffer.splice(0, 100),
          timestamp: new Date().toISOString()
        };

        return fetch('/api/track', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': token ? `Bearer ${token}` : '',
            'X-Request-ID': Math.random().toString(36).substr(2, 9)
          },
          body: JSON.stringify(payload)
        }).catch(e => {
          console.warn('[LogTracker] Send error:', e.message);
        });
      };
    </script>
