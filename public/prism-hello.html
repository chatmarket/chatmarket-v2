<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: transparent;
  overflow: hidden;
  width: 100vw;
  height: 100vh;
  -webkit-transform: translateZ(0);
}

/* ━━ 左上: 常時表示バッジ ━━ */
.badge {
  position: fixed;
  top: 16px;
  left: 16px;
  background: rgba(0,0,0,0.92);
  border: 3px solid #22c55e;
  border-radius: 12px;
  padding: 10px 18px;
  display: flex;
  align-items: center;
  gap: 8px;
  z-index: 2147483647;
  -webkit-transform: translateZ(0) translate3d(0,0,0);
  box-shadow: 0 0 20px rgba(34,197,94,0.5);
}
.dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: #22c55e;
  animation: pulse 1.2s infinite;
  -webkit-animation: pulse 1.2s infinite;
}
.badge-text {
  font-size: 14px;
  font-weight: 900;
  color: #22c55e;
  font-family: -apple-system, sans-serif;
  letter-spacing: 0.5px;
}

/* ━━ 中央: 大きなテスト表示 ━━ */
.center {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  -webkit-transform: translate(-50%, -50%) translateZ(0);
  z-index: 2147483647;
  text-align: center;
}
.main-text {
  font-size: 48px;
  font-weight: 900;
  color: #ffffff;
  font-family: -apple-system, sans-serif;
  -webkit-text-stroke: 2px #000;
  text-shadow: 0 0 20px rgba(255,255,255,0.8);
  line-height: 1.2;
}
.sub-text {
  font-size: 18px;
  font-weight: 700;
  color: #22c55e;
  font-family: -apple-system, sans-serif;
  text-shadow: 0 0 10px rgba(34,197,94,0.8);
  margin-top: 8px;
}

/* ━━ 右下: タイムスタンプ ━━ */
.timestamp {
  position: fixed;
  bottom: 20px;
  right: 16px;
  background: rgba(0,0,0,0.88);
  border: 2px solid #3b82f6;
  border-radius: 10px;
  padding: 8px 14px;
  z-index: 2147483647;
  -webkit-transform: translateZ(0) translate3d(0,0,0);
}
.ts-text {
  font-size: 13px;
  font-weight: 700;
  color: #93c5fd;
  font-family: monospace;
}

/* ━━ チャット風サンプル ━━ */
.chat {
  position: fixed;
  bottom: 70px;
  left: 12px;
  z-index: 2147483647;
  -webkit-transform: translateZ(0) translate3d(0,0,0);
}
.chat-msg {
  background: rgba(0,0,0,0.82);
  border-radius: 8px;
  padding: 5px 10px;
  margin-bottom: 6px;
  font-size: 15px;
  font-weight: 700;
  font-family: -apple-system, sans-serif;
  color: #fff;
}
.chat-name { color: #10b981; }

@-webkit-keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}
</style>
</head>
<body>

<!-- 常時表示バッジ -->
<div class="badge">
  <div class="dot"></div>
  <span class="badge-text">✅ OVERLAY WORKING</span>
</div>

<!-- 中央テスト表示 -->
<div class="center">
  <div class="main-text">PRISM<br>オーバーレイ<br>テスト</div>
  <div class="sub-text">表示確認用 — 純静的HTML</div>
</div>

<!-- チャット風サンプル -->
<div class="chat">
  <div class="chat-msg"><span class="chat-name">視聴者A:</span> こんにちは！</div>
  <div class="chat-msg"><span class="chat-name">視聴者B:</span> 応援してます🎉</div>
  <div class="chat-msg" style="background:rgba(251,191,36,0.25); border:1px solid #fbbf24;">
    ⭐ <span style="color:#fbbf24; font-weight:900;">視聴者C から 500コイン！</span>
  </div>
</div>

<!-- タイムスタンプ -->
<div class="timestamp">
  <div class="ts-text" id="ts">読み込み中...</div>
</div>

<script>
  // タイムスタンプ更新（最小限JS）
  function updateTs() {
    var el = document.getElementById('ts');
    if (el) el.textContent = '🕐 ' + new Date().toLocaleTimeString('ja-JP');
  }
  updateTs();
  setInterval(updateTs, 1000);
</script>
</body>
</html>
