<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html { background: transparent !important; background-color: transparent !important; }
body {
  background: transparent !important;
  background-color: transparent !important;
  overflow: hidden;
  width: 100vw; height: 100vh;
}

/* ━━ 右上バッジ ━━ */
#badge {
  position: fixed;
  top: 12px; right: 12px;
  background: rgba(0,0,0,0.55);
  border: 1px solid #22c55e;
  border-radius: 20px;
  padding: 4px 10px;
  display: flex; align-items: center; gap: 5px;
  z-index: 2147483647;
  opacity: 1 !important;
}
.dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: #22c55e;
  animation: blink 1.2s infinite;
}
#badge-text {
  font-size: 11px; font-weight: 700; color: #22c55e;
  font-family: -apple-system, sans-serif;
  opacity: 1 !important;
}

/* ━━ システムメッセージ（起動確認用・10秒） ━━ */
#sysmsg {
  position: fixed;
  top: 50px; left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.75);
  border: 2px solid #22c55e;
  border-radius: 12px;
  padding: 10px 22px;
  font-size: 15px; font-weight: 800;
  color: #22c55e;
  font-family: -apple-system, sans-serif;
  z-index: 2147483647;
  opacity: 1 !important;
  white-space: nowrap;
  transition: opacity 0.6s;
}

/* ━━ チャットエリア（下から積み上がる） ━━ */
#chat {
  position: fixed;
  bottom: 16px; left: 8px; right: 8px;
  display: flex; flex-direction: column;
  gap: 5px;
  align-items: flex-start;
  z-index: 2147483647;
  opacity: 1 !important;
}
.msg {
  display: inline-flex; gap: 5px;
  font-size: 16px; font-weight: 800; line-height: 1.4;
  font-family: -apple-system, sans-serif;
  opacity: 1 !important;
  text-shadow:
    1px  1px 0 #000, -1px -1px 0 #000,
    1px -1px 0 #000, -1px  1px 0 #000,
    0    0   8px rgba(0,0,0,1),
    0    0  16px rgba(0,0,0,0.8);
  max-width: 94vw;
  animation: msgIn 0.35s ease-out forwards;
}
.msg-name { color: #4ade80; white-space: nowrap; flex-shrink: 0; }
.msg-text { color: #ffffff; word-break: break-word; }

/* ━━ エール通知（中央・背景なし） ━━ */
#yell {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  z-index: 2147483646;
  text-align: center;
  pointer-events: none;
  opacity: 0;
  display: none;
}
#yell.show {
  display: block;
  animation: yellIn 5s ease-in-out forwards;
}
#yell-coins {
  font-size: clamp(52px,14vw,88px);
  font-weight: 900; color: #fbbf24;
  -webkit-text-stroke: 3px #000;
  text-shadow: 0 0 40px rgba(251,191,36,1), 0 0 80px rgba(251,191,36,0.6);
  line-height: 1.1; margin-bottom: 8px;
  font-family: -apple-system, sans-serif;
  opacity: 1 !important;
}
#yell-user {
  font-size: clamp(18px,5vw,28px);
  font-weight: 800; color: #fff;
  -webkit-text-stroke: 2px #000;
  text-shadow: 0 0 20px rgba(251,191,36,0.9);
  margin-bottom: 8px;
  font-family: -apple-system, sans-serif;
  opacity: 1 !important;
}
#yell-msg {
  display: none;
  font-size: clamp(13px,3.5vw,18px);
  color: #fde047;
  background: rgba(0,0,0,0.65);
  border: 2px solid rgba(251,191,36,0.7);
  border-radius: 10px;
  padding: 8px 18px;
  max-width: 75vw;
  font-weight: 700;
  font-family: -apple-system, sans-serif;
  opacity: 1 !important;
}

/* ━━ アニメーション ━━ */
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

@keyframes msgIn {
  from { opacity:0; transform: translateX(-12px); }
  to   { opacity:1; transform: translateX(0); }
}

@keyframes yellIn {
  0%   { opacity:0; transform: translate(-50%,-50%) scale(0.6); }
  12%  { opacity:1; transform: translate(-50%,-50%) scale(1.1); }
  22%  { transform: translate(-50%,-50%) scale(1); }
  82%  { opacity:1; }
  100% { opacity:0; transform: translate(-50%,-50%) scale(0.95); }
}
</style>
</head>
<body>

<div id="badge"><div class="dot"></div><span id="badge-text">接続中...</span></div>
<div id="sysmsg">⏳ 接続中...</div>
<div id="chat"></div>
<div id="yell">
  <div id="yell-coins"></div>
  <div id="yell-user"></div>
  <div id="yell-msg"></div>
</div>

<script>
// ─── 設定 ────────────────────────────────────────────
var APP_ID = '69c1b541d5db3555833124aa';
var API    = 'https://api.base44.com/api/apps/' + APP_ID;

var params   = new URLSearchParams(window.location.search);
var streamId = params.get('id') || params.get('streamId') || '';

// ─── 状態 ────────────────────────────────────────────
var messages   = [];
var seenIds    = {};
var yellTimer  = null;
var isLive     = false;
var viewers    = 0;

// ─── DOM ─────────────────────────────────────────────
var chatEl    = document.getElementById('chat');
var badgeText = document.getElementById('badge-text');
var yellEl    = document.getElementById('yell');
var sysmsg    = document.getElementById('sysmsg');

// ─── システムメッセージ（10秒表示） ──────────────────
function showSysMsg(text) {
  sysmsg.textContent = text;
  sysmsg.style.opacity = '1';
  setTimeout(function() {
    sysmsg.style.opacity = '0';
    setTimeout(function() { sysmsg.style.display = 'none'; }, 700);
  }, 10000);
}

// ─── バッジ更新 ───────────────────────────────────────
function updateBadge(ok) {
  if (ok === false) {
    badgeText.textContent = 'エラー';
    badgeText.style.color = '#f87171';
    document.querySelector('.dot').style.background = '#f87171';
    return;
  }
  badgeText.textContent = isLive ? ('● LIVE · ' + viewers + '人') : '● CM';
  badgeText.style.color = isLive ? '#f87171' : '#aaa';
  document.querySelector('.dot').style.background = isLive ? '#f87171' : '#888';
}

// ─── チャット描画 ─────────────────────────────────────
function addMsg(id, user, text) {
  if (!text || seenIds['c_' + id]) return;
  seenIds['c_' + id] = true;
  messages.push({ id: id, user: user, text: text });
  if (messages.length > 8) messages.shift();
  renderChat();
}

function renderChat() {
  chatEl.innerHTML = '';
  var total = messages.length;
  messages.forEach(function(m, i) {
    var baseOpacity = 0.4 + (i / Math.max(total - 1, 1)) * 0.6;
    var div = document.createElement('div');
    div.className = 'msg';
    div.style.opacity = String(baseOpacity);

    var name = document.createElement('span');
    name.className = 'msg-name';
    name.textContent = m.user;

    var text = document.createElement('span');
    text.className = 'msg-text';
    text.textContent = '：' + m.text;

    div.appendChild(name);
    div.appendChild(text);
    chatEl.appendChild(div);
  });
}

// ─── エール表示 ───────────────────────────────────────
function showYell(user, amount, msg) {
  document.getElementById('yell-coins').textContent = '⭐ ' + Number(amount).toLocaleString();
  document.getElementById('yell-user').textContent  = user + ' さん';
  var msgEl = document.getElementById('yell-msg');
  if (msg) { msgEl.textContent = '💬 ' + msg; msgEl.style.display = 'inline-block'; }
  else      { msgEl.style.display = 'none'; }

  yellEl.classList.remove('show');
  void yellEl.offsetWidth;
  yellEl.classList.add('show');

  if (yellTimer) clearTimeout(yellTimer);
  yellTimer = setTimeout(function() { yellEl.classList.remove('show'); }, 5200);
}

// ─── REST フェッチ（共通） ────────────────────────────
function fetchList(entity, filters, cb) {
  fetch(API + '/entities/' + entity + '/filter', {
    method : 'POST',
    headers: { 'Content-Type': 'application/json' },
    body   : JSON.stringify({ filters: filters, sort: '-created_date', limit: 20 })
  })
  .then(function(r) { return r.ok ? r.json() : Promise.reject(r.status); })
  .then(function(d) { cb(null, Array.isArray(d) ? d : (d.data || [])); })
  .catch(function(e) { cb(e, []); });
}

// ─── コメント取得（target_id と livestream_id 両方を並列取得） ───
function pollComments() {
  if (!streamId) return;

  var done = 0;
  var combined = [];
  function merge(err, items) {
    if (!err) combined = combined.concat(items);
    done++;
    if (done < 2) return;
    // 重複除去してaddMsg
    combined.forEach(function(c) {
      addMsg(c.id, c.user_name || '匿名', c.content || c.text || '');
    });
  }

  fetchList('Comment', { target_id: streamId, target_type: 'livestream_chat' }, merge);
  fetchList('Comment', { livestream_id: streamId }, merge);
}

// ─── エール取得 ───────────────────────────────────────
function pollYells() {
  if (!streamId) return;
  fetchList('SuperChat', { livestream_id: streamId }, function(err, items) {
    if (err) return;
    if (!items.length) return;
    var newest = items[0];
    if (!seenIds['y_' + newest.id]) {
      seenIds['y_' + newest.id] = true;
      showYell(newest.user_name || '匿名', newest.amount || 0, newest.message || '');
      addMsg('yell_' + newest.id,
        '⭐ ' + (newest.user_name || '匿名'),
        (newest.amount || 0) + 'コイン' + (newest.message ? ' 「' + newest.message + '」' : ''));
    }
  });
}

// ─── 配信状態取得 ─────────────────────────────────────
function pollStream() {
  if (!streamId) return;
  fetchList('LiveStream', { id: streamId }, function(err, items) {
    if (err) { updateBadge(false); return; }
    var s = items[0];
    if (!s) return;
    isLive  = s.status === 'live';
    viewers = s.viewer_count || 0;
    updateBadge();
  });
}

// ─── 起動シーケンス ───────────────────────────────────
if (!streamId) {
  showSysMsg('⚠️ URLに ?id=xxx が必要です');
} else {
  showSysMsg('✅ システム接続完了 — チャット受信中');

  pollComments();
  pollStream();
  pollYells();

  setInterval(pollComments,  2000);
  setInterval(pollYells,     3000);
  setInterval(pollStream,   10000);
}
</script>
</body>
</html>
